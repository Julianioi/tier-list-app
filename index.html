<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>专属排行榜生成器</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 使用极速轻量的 Vue 3 全局构建版 -->
    <script src="https://cdn.staticfile.net/vue/3.3.4/vue.global.prod.min.js"></script>
    <!-- 引入 html2canvas 用于导出图片 -->
    <script src="https://cdn.staticfile.net/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        /* 隐藏 Vue 未编译完成时的变量闪烁 */
        [v-cloak] { display: none !important; }
        
        /* 隐藏滚动条但保留滚动功能，让界面更清爽 */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1; 
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .dark-scrollbar::-webkit-scrollbar-thumb { background: #4b5563; }
        .dark-scrollbar::-webkit-scrollbar-thumb:hover { background: #6b7280; }
        
        /* 防止移动端长按弹出菜单和选择文字 */
        .no-select {
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            touch-action: none; 
        }
        /* 自定义拖拽占位符的样式 */
        .touch-ghost {
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            opacity: 0.95;
            transform: scale(1.05) rotate(-3deg);
            box-shadow: 0 15px 30px rgba(0,0,0,0.3);
            border-radius: 8px;
        }
        
        /* 手机竖屏提示层样式 */
        .landscape-prompt { display: none; }
        @media screen and (orientation: portrait) {
            .landscape-prompt.active { display: flex; }
        }
    </style>
</head>
<body class="bg-gradient-to-br from-gray-50 to-gray-200 text-gray-800 font-sans selection:bg-blue-200 overflow-x-hidden">
    
    <!-- Vue 挂载点 -->
    <div id="app" v-cloak>
        <div :class="isFullscreen ? 'fixed inset-0 z-50 bg-gray-100 flex flex-row overflow-hidden' : 'min-h-screen p-3 sm:p-6 md:p-10'">
            
            <!-- --- 手机全屏竖屏提示层 --- -->
            <div :class="['landscape-prompt fixed inset-0 z-[200] bg-gray-900 text-white flex-col items-center justify-center p-6 text-center', isFullscreen ? 'active' : '']">
                <div class="mb-8 relative">
                    <svg class="w-20 h-20 text-blue-500 animate-[spin_2s_ease-in-out_infinite]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 18h.01M8 21h8a2 2 0 002-2V5a2 2 0 00-2-2H8a2 2 0 00-2 2v14a2 2 0 002 2z" /></svg>
                </div>
                <h2 class="text-2xl font-black mb-3 tracking-wider">请旋转手机至横屏</h2>
                <p class="text-gray-400 mb-8 text-sm">全屏排版模式在横屏下体验极佳<br/>（请确保已关闭系统“方向锁定”）</p>
                <button @click="isFullscreen = false" class="px-8 py-3 bg-gray-800 hover:bg-gray-700 rounded-xl font-bold transition-colors shadow-lg border border-gray-700 cursor-pointer text-gray-300">
                    暂不全屏
                </button>
            </div>

            <!-- --- 左侧图库侧边栏 (仅全屏模式下显示) --- -->
            <div v-if="isFullscreen" data-dropzone="pool" class="w-20 sm:w-28 md:w-36 bg-gray-800 border-r border-gray-900 flex flex-col gap-2 p-2 sm:p-3 overflow-y-auto dark-scrollbar" @dragover="e => handleDragOver(e, 'pool')" @dragleave="handleDragLeave" @drop="e => handleDrop(e, 'pool')">
                <div class="text-center text-gray-400 text-xs font-bold py-1 border-b border-gray-700 mb-1 select-none">待排图库 ({{pool.length}})</div>
                <div v-if="pool.length === 0" class="text-gray-500 text-xs text-center mt-6 select-none opacity-50">
                    <svg class="w-6 h-6 mx-auto mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>
                    空
                </div>
                <div v-for="item in pool" :key="item.id" draggable="true" @dragstart="e => handleDragStart(e, item, 'pool')" @dragend="handleDragEnd" @touchstart="e => handleTouchStart(e, item, 'pool')" @touchmove="handleTouchMove" @touchend="handleTouchEnd" @touchcancel="handleTouchEnd" :class="['relative group cursor-grab active:cursor-grabbing hover:z-10 transition-transform duration-100 no-select w-full', dragged && dragged.item.id === item.id ? 'opacity-50 scale-95 shadow-md' : 'opacity-100']">
                    <img :src="item.url" :alt="item.name" class="w-full h-auto aspect-square border-2 border-gray-600 rounded-lg object-cover shadow-sm group-hover:shadow-xl group-hover:scale-110 group-hover:border-blue-400 transition-all duration-200 pointer-events-none" />
                </div>
            </div>

            <!-- --- 主内容区域 (核心表格与顶部栏) --- -->
            <div :class="isFullscreen ? 'flex-1 overflow-y-auto p-2 sm:p-4 md:p-6 relative' : 'max-w-6xl mx-auto space-y-6 md:space-y-8'">
                
                <!-- 顶部控制栏 (普通模式下显示) -->
                <header v-if="!isFullscreen" class="flex flex-col lg:flex-row justify-between items-center pb-4 sm:pb-6 gap-4 sm:gap-6 bg-white/60 p-4 sm:p-6 rounded-2xl shadow-[0_4px_20px_rgb(0,0,0,0.03)] backdrop-blur-xl border border-white/50">
                    <div class="text-center lg:text-left">
                        <h1 class="text-2xl sm:text-3xl md:text-4xl font-black tracking-tight text-gray-900 mb-2 drop-shadow-sm">
                            ✨ 专属排行榜生成器
                        </h1>
                        <p class="text-gray-500 font-medium text-xs sm:text-sm">
                            上传图片 <span class="mx-1 sm:mx-2 text-gray-300">|</span> 自由拖拽 <span class="mx-1 sm:mx-2 text-gray-300">|</span> 一键导出长图
                        </p>
                    </div>
                    
                    <div class="flex flex-wrap justify-center gap-2 sm:gap-3 w-full lg:w-auto">
                        <input type="file" multiple accept="image/*" class="hidden" ref="fileInputRef" @change="handleFileUpload" />
                        
                        <button @click="fileInputRef.click()" class="flex-1 lg:flex-none justify-center bg-white hover:bg-blue-50 text-blue-600 border border-blue-200 px-3 sm:px-5 py-2.5 rounded-xl font-bold transition-all shadow-sm hover:shadow active:scale-95 flex items-center text-sm sm:text-base cursor-pointer">
                            <svg class="w-5 h-5 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" /></svg>
                            上传
                        </button>
                        
                        <button @click="isFullscreen = true" class="flex-1 lg:flex-none justify-center bg-purple-50 hover:bg-purple-100 text-purple-600 border border-purple-200 px-3 sm:px-5 py-2.5 rounded-xl font-bold transition-all shadow-sm hover:shadow active:scale-95 flex items-center text-sm sm:text-base cursor-pointer">
                            <svg class="w-5 h-5 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4" /></svg>
                            全屏排版
                        </button>

                        <button @click="handleExport" :disabled="isExporting" :class="['flex-1 lg:flex-none justify-center text-white px-3 sm:px-5 py-2.5 rounded-xl font-bold transition-all shadow-md hover:-translate-y-0.5 active:scale-95 flex items-center text-sm sm:text-base cursor-pointer', isExporting ? 'bg-gray-400 cursor-wait' : 'bg-blue-600 hover:bg-blue-700']">
                            <svg class="w-5 h-5 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" /></svg>
                            {{ isExporting ? '生成中...' : '生成图片' }}
                        </button>

                        <button @click="showClearModal = true" class="w-full sm:w-auto justify-center bg-red-50 hover:bg-red-100 text-red-600 px-3 sm:px-5 py-2.5 rounded-xl font-bold transition-all border border-red-200 shadow-sm active:scale-95 flex items-center text-sm sm:text-base cursor-pointer">
                            清空
                        </button>
                    </div>
                </header>

                <!-- 悬浮操作栏 (仅全屏模式下显示) -->
                <div v-if="isFullscreen" class="absolute top-2 right-2 sm:top-4 sm:right-6 z-10 flex gap-2 sm:gap-3 opacity-90 hover:opacity-100 transition-opacity">
                    <button @click="handleExport" :disabled="isExporting" :class="['shadow-lg px-3 sm:px-4 py-2 rounded-lg text-xs sm:text-sm font-bold text-white flex items-center transition-transform active:scale-95', isExporting ? 'bg-gray-400 cursor-wait' : 'bg-blue-600 hover:bg-blue-700 border border-blue-700 cursor-pointer']">
                        <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" /></svg>
                        {{ isExporting ? '生成中...' : '生成长图' }}
                    </button>
                    <button @click="isFullscreen = false" class="bg-white/90 backdrop-blur shadow-lg border border-gray-300 px-3 sm:px-4 py-2 rounded-lg text-xs sm:text-sm font-bold text-gray-700 hover:bg-white flex items-center cursor-pointer transition-transform active:scale-95">
                        退出全屏
                    </button>
                </div>

                <!-- 排行榜核心渲染区域 -->
                <div :class="isFullscreen ? 'max-w-6xl mx-auto mt-14 sm:mt-0 pb-10' : 'relative pt-2'">
                    <div :class="isFullscreen ? '' : 'bg-white p-2 sm:p-4 md:p-6 rounded-2xl shadow-[0_8px_30px_rgb(0,0,0,0.06)] ring-1 ring-gray-900/5 overflow-x-auto'">
                        <div id="tier-list-core" class="min-w-[450px] border-[3px] sm:border-[4px] border-gray-900 bg-gray-900 flex flex-col rounded-lg overflow-hidden">
                            
                            <div v-for="(tier, index) in tiers" :key="tier.id" :class="['flex w-full min-h-[90px] sm:min-h-[110px] md:min-h-[130px] bg-gray-100', index !== tiers.length - 1 ? 'border-b-[3px] sm:border-b-[4px] border-gray-900' : '']">
                                <div class="w-20 sm:w-28 md:w-36 flex-shrink-0 flex items-center justify-center border-r-[3px] sm:border-r-[4px] border-gray-900 text-gray-900 font-black text-lg sm:text-xl md:text-3xl p-1 sm:p-2 text-center break-words select-none" :style="{ backgroundColor: tier.bgColor }">
                                    <span class="drop-shadow-[0_1px_1px_rgba(255,255,255,0.4)]">{{tier.label}}</span>
                                </div>
                                
                                <div :data-dropzone="tier.id" :class="['flex-1 p-3 sm:p-4 md:p-5 flex flex-wrap gap-2 sm:gap-3 items-start content-start transition-colors duration-200', dragOverId === tier.id ? 'bg-blue-100/60 shadow-inner' : 'bg-gray-50']" @dragover="e => handleDragOver(e, tier.id)" @dragleave="handleDragLeave" @drop="e => handleDrop(e, tier.id)">
                                    <div v-for="item in tier.items" :key="item.id" draggable="true" @dragstart="e => handleDragStart(e, item, tier.id)" @dragend="handleDragEnd" @touchstart="e => handleTouchStart(e, item, tier.id)" @touchmove="handleTouchMove" @touchend="handleTouchEnd" @touchcancel="handleTouchEnd" :class="['relative group cursor-grab active:cursor-grabbing hover:z-10 transition-transform duration-100 no-select', dragged && dragged.item.id === item.id ? 'opacity-50 scale-95 shadow-md' : 'opacity-100']">
                                        <img :src="item.url" :alt="item.name" class="w-16 h-16 sm:w-20 sm:h-20 md:w-24 md:h-24 object-cover border-[3px] border-white rounded-lg shadow-sm group-hover:shadow-xl group-hover:scale-110 group-hover:border-blue-400 transition-all duration-200 pointer-events-none" />
                                    </div>
                                </div>
                            </div>

                        </div>
                    </div>
                </div>

                <!-- 底部待选图片池 (仅普通模式下显示) -->
                <div v-if="!isFullscreen" class="pt-2 sm:pt-4">
                    <h2 class="text-lg sm:text-xl font-bold mb-3 sm:mb-4 flex items-center text-gray-800 px-2 select-none">
                        <span class="bg-blue-100 text-blue-600 p-1.5 rounded-lg mr-2 shadow-sm">
                            <svg class="w-5 h-5 sm:w-6 sm:h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" /></svg>
                        </span>
                        待分类图片库
                        <span class="ml-3 bg-white shadow-sm border border-gray-200 text-gray-600 py-0.5 px-3 rounded-full text-sm font-bold">
                            {{pool.length}}
                        </span>
                    </h2>
                    <div data-dropzone="pool" :class="['border-2 border-dashed rounded-2xl p-4 sm:p-6 min-h-[160px] sm:min-h-[220px] flex flex-wrap gap-2 sm:gap-4 items-start content-start transition-all duration-300', dragOverId === 'pool' ? 'border-blue-500 bg-blue-50/80 shadow-inner' : 'border-gray-300 bg-white/60 hover:bg-white/80']" @dragover="e => handleDragOver(e, 'pool')" @dragleave="handleDragLeave" @drop="e => handleDrop(e, 'pool')">
                        <div v-if="pool.length === 0" class="w-full h-full flex flex-col items-center justify-center text-gray-400 mt-6 sm:mt-10 pointer-events-none select-none">
                            <div class="bg-gray-100 p-4 rounded-full mb-3 shadow-inner">
                                <svg class="w-8 h-8 sm:w-12 sm:h-12 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>
                            </div>
                            <p class="text-sm sm:text-base text-center px-4">
                                点击上方 <span class="font-bold text-gray-500">上传图片</span> 将图片添加至此<br class="hidden sm:block"/>然后拖拽到上方排行榜中
                            </p>
                        </div>
                        <div v-for="item in pool" :key="item.id" draggable="true" @dragstart="e => handleDragStart(e, item, 'pool')" @dragend="handleDragEnd" @touchstart="e => handleTouchStart(e, item, 'pool')" @touchmove="handleTouchMove" @touchend="handleTouchEnd" @touchcancel="handleTouchEnd" :class="['relative group cursor-grab active:cursor-grabbing hover:z-10 transition-transform duration-100 no-select', dragged && dragged.item.id === item.id ? 'opacity-50 scale-95 shadow-md' : 'opacity-100']">
                            <img :src="item.url" :alt="item.name" class="w-16 h-16 sm:w-20 sm:h-20 md:w-24 md:h-24 object-cover border-[3px] border-white rounded-lg shadow-sm group-hover:shadow-xl group-hover:scale-110 group-hover:border-blue-400 transition-all duration-200 pointer-events-none" />
                        </div>
                    </div>
                </div>

                <!-- 清空确认弹窗 -->
                <div v-if="showClearModal" class="fixed inset-0 bg-gray-900/40 backdrop-blur-sm flex items-center justify-center z-[900] p-4">
                    <div class="bg-white rounded-2xl shadow-2xl p-6 sm:p-8 max-w-sm w-full animate-in fade-in zoom-in duration-200">
                        <div class="w-12 h-12 rounded-full bg-red-100 flex items-center justify-center mb-4">
                            <svg class="w-6 h-6 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" /></svg>
                        </div>
                        <h3 class="text-xl font-black text-gray-900 mb-2">确认清空？</h3>
                        <p class="text-gray-500 text-sm sm:text-base mb-8 leading-relaxed">这将会移除所有已上传的图片并重置所有分类，该操作不可恢复。</p>
                        <div class="flex justify-end gap-3">
                            <button @click="showClearModal = false" class="px-5 py-2.5 rounded-xl font-bold text-gray-600 bg-gray-100 hover:bg-gray-200 transition-colors cursor-pointer">取消</button>
                            <button @click="confirmClear" class="px-5 py-2.5 rounded-xl font-bold bg-red-600 text-white hover:bg-red-700 transition-colors shadow-sm shadow-red-200 cursor-pointer">确认清空</button>
                        </div>
                    </div>
                </div>

                <!-- 【终极防拦截】导出预览展示弹窗 -->
                <div v-if="exportedImage" class="fixed inset-0 bg-gray-900/95 backdrop-blur-md flex flex-col items-center justify-center z-[9999] p-4 sm:p-8">
                    <div class="flex justify-between items-center w-full max-w-4xl text-white mb-4">
                        <h3 class="text-xl font-bold text-green-400 flex items-center">
                            <svg class="w-6 h-6 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                            图片生成成功！
                        </h3>
                        <button @click="exportedImage = null" class="px-5 py-2 bg-gray-700 hover:bg-red-600 rounded-xl font-bold transition-colors shadow-lg cursor-pointer">
                            关闭返回
                        </button>
                    </div>
                    
                    <!-- 生成的真实图片，避免被下载软件识别为附件 -->
                    <div class="bg-black border-[4px] border-gray-700 rounded-lg overflow-auto max-h-[65vh] w-full max-w-4xl shadow-[0_0_50px_rgba(0,0,0,0.5)]">
                        <img :src="exportedImage" alt="排行榜导出大图" class="w-full h-auto block" />
                    </div>
                    
                    <p class="text-white mt-6 text-base sm:text-lg font-bold bg-blue-600/20 border border-blue-500 px-6 py-3 rounded-xl text-center shadow-lg">
                        👉 请在上方图片上 <span class="text-yellow-400">右键点击</span>（手机长按），选择 <span class="text-yellow-400">“图片另存为...”</span> 即可无损保存！
                    </p>
                </div>

            </div>
            
            <!-- 移动端拖拽幽灵元素 -->
            <img v-if="touchGhost" :src="touchGhost.src" class="touch-ghost" :style="{ left: (touchGhost.x - touchGhost.offsetX) + 'px', top: (touchGhost.y - touchGhost.offsetY) + 'px', width: touchGhost.width + 'px', height: touchGhost.height + 'px' }" alt="dragging" />

        </div>
    </div>

    <script>
        const { createApp, ref } = Vue;

        const initialTiers = [
          { id: 't1', label: '夯', bgColor: '#ef4444', items: [] },
          { id: 't2', label: '顶级', bgColor: '#facc15', items: [] },
          { id: 't3', label: '人上人', bgColor: '#fef08a', items: [] },
          { id: 't4', label: 'NPC', bgColor: '#fef3c7', items: [] },
          { id: 't5', label: '拉完了', bgColor: '#ffffff', items: [] },
        ];

        createApp({
            setup() {
                const tiers = ref(JSON.parse(JSON.stringify(initialTiers)));
                const pool = ref([]);
                const dragged = ref(null);
                const dragOverId = ref(null);
                const showClearModal = ref(false);
                const isFullscreen = ref(false);
                const touchGhost = ref(null);
                const fileInputRef = ref(null);
                const scrollTimeout = ref(null);
                
                // 新增：导出相关的状态
                const isExporting = ref(false);
                const exportedImage = ref(null);

                const handleFileUpload = (e) => {
                    const files = Array.from(e.target.files);
                    if (files.length === 0) return;

                    const newItems = files.map((file) => ({
                        id: Math.random().toString(36).substring(2, 10),
                        url: URL.createObjectURL(file),
                        name: file.name
                    }));

                    pool.value.push(...newItems);
                    e.target.value = null; 
                };

                const handleDragStart = (e, item, sourceId) => {
                    dragged.value = { item, sourceId };
                    const emptyImage = new Image();
                    emptyImage.src = 'data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7';
                    e.dataTransfer.setDragImage(emptyImage, 0, 0);
                    e.dataTransfer.effectAllowed = 'move';
                };

                const handleDragEnd = () => {
                    dragged.value = null;
                    dragOverId.value = null;
                };

                const handleDragOver = (e, targetId) => {
                    e.preventDefault();
                    e.dataTransfer.dropEffect = 'move';
                    if (dragOverId.value !== targetId) {
                        dragOverId.value = targetId;
                    }
                };

                const handleDragLeave = (e) => {
                    e.preventDefault();
                    dragOverId.value = null;
                };

                const handleDrop = (e, targetId) => {
                    e.preventDefault();
                    const target = dragOverId.value || targetId;
                    dragOverId.value = null;
                    if (!dragged.value) return;
                    moveItem(dragged.value.item, dragged.value.sourceId, target);
                    dragged.value = null; 
                };

                const handleTouchStart = (e, item, sourceId) => {
                    const touch = e.touches[0];
                    const target = e.target;
                    const rect = target.getBoundingClientRect();
                    
                    dragged.value = { item, sourceId };
                    
                    touchGhost.value = {
                        src: item.url,
                        x: touch.clientX,
                        y: touch.clientY,
                        offsetX: touch.clientX - rect.left,
                        offsetY: touch.clientY - rect.top,
                        width: rect.width,
                        height: rect.height
                    };
                    
                    if (navigator.vibrate) {
                        navigator.vibrate(50);
                    }
                };

                const handleTouchMove = (e) => {
                    if (!touchGhost.value || !dragged.value) return;
                    e.preventDefault();

                    const touch = e.touches[0];
                    const clientX = touch.clientX;
                    const clientY = touch.clientY;

                    touchGhost.value.x = clientX;
                    touchGhost.value.y = clientY;

                    handleEdgeScrolling(clientY);

                    let currentOverId = null;
                    const zones = document.querySelectorAll('[data-dropzone]');
                    for (let i = 0; i < zones.length; i++) {
                        const rect = zones[i].getBoundingClientRect();
                        if (clientX >= rect.left && clientX <= rect.right && clientY >= rect.top && clientY <= rect.bottom) {
                            currentOverId = zones[i].getAttribute('data-dropzone');
                            break;
                        }
                    }

                    if (dragOverId.value !== currentOverId) {
                        dragOverId.value = currentOverId;
                    }
                };

                const handleTouchEnd = (e) => {
                    if (!dragged.value) return;
                    
                    clearTimeout(scrollTimeout.value);

                    if (dragOverId.value && dragOverId.value !== dragged.value.sourceId) {
                        moveItem(dragged.value.item, dragged.value.sourceId, dragOverId.value);
                    }

                    dragged.value = null;
                    dragOverId.value = null;
                    touchGhost.value = null;
                };

                const handleEdgeScrolling = (clientY) => {
                    const edgeSize = 60;
                    const maxScrollSpeed = 15;
                    const scrollY = window.scrollY;
                    const windowHeight = window.innerHeight;

                    clearTimeout(scrollTimeout.value);

                    if (clientY < edgeSize) {
                        const speed = maxScrollSpeed * (1 - clientY / edgeSize);
                        if (scrollY > 0) {
                            window.scrollBy(0, -speed);
                            scrollTimeout.value = setTimeout(() => handleEdgeScrolling(clientY), 16);
                        }
                    } else if (clientY > windowHeight - edgeSize) {
                        const speed = maxScrollSpeed * (1 - (windowHeight - clientY) / edgeSize);
                        const maxScroll = document.documentElement.scrollHeight - windowHeight;
                        if (scrollY < maxScroll) {
                            window.scrollBy(0, speed);
                            scrollTimeout.value = setTimeout(() => handleEdgeScrolling(clientY), 16);
                        }
                    }
                };

                const moveItem = (item, sourceId, targetId) => {
                    if (sourceId === targetId) return;

                    if (sourceId === 'pool') {
                        pool.value = pool.value.filter((i) => i.id !== item.id);
                    } else {
                        const tier = tiers.value.find((t) => t.id === sourceId);
                        if (tier) tier.items = tier.items.filter((i) => i.id !== item.id);
                    }

                    if (targetId === 'pool') {
                        pool.value.push(item);
                    } else {
                        const tier = tiers.value.find((t) => t.id === targetId);
                        if (tier) tier.items.push(item);
                    }
                };

                const handleExport = async () => {
                    if (isExporting.value) return;
                    
                    if (!window.html2canvas) {
                        alert("图片生成组件还在加载中，请稍后再试！");
                        return;
                    }

                    isExporting.value = true;
                    const element = document.getElementById('tier-list-core');
                    
                    // 记住原始的样式
                    const originalWidth = element.style.width;
                    const originalMaxWidth = element.style.maxWidth;
                    const originalTransition = element.style.transition;
                    
                    try {
                        // 临时将 DOM 强制设为电脑宽屏尺寸，防溢出
                        element.style.transition = 'none';
                        element.style.width = '1024px';
                        element.style.maxWidth = '1024px';
                        
                        // 留出时间渲染
                        await new Promise(resolve => setTimeout(resolve, 200));

                        const canvas = await window.html2canvas(element, { 
                            useCORS: true,
                            backgroundColor: '#111827', 
                            scale: 2,
                            windowWidth: 1024
                        });
                        
                        // 恢复原样
                        element.style.width = originalWidth;
                        element.style.maxWidth = originalMaxWidth;
                        element.style.transition = originalTransition;

                        // 【终极方案】：不自动下载，而是直接显示出图片让用户自己右键保存
                        exportedImage.value = canvas.toDataURL('image/png', 1.0);

                    } catch (err) {
                        console.error("导出图片失败", err);
                        alert("导出失败，请检查浏览器权限。");
                        element.style.width = originalWidth;
                        element.style.maxWidth = originalMaxWidth;
                        element.style.transition = originalTransition;
                    } finally {
                        isExporting.value = false;
                    }
                };

                const confirmClear = () => {
                    tiers.value = JSON.parse(JSON.stringify(initialTiers));
                    pool.value = [];
                    showClearModal.value = false;
                };

                return {
                    tiers, pool, dragged, dragOverId, showClearModal, isFullscreen,
                    touchGhost, fileInputRef, isExporting, exportedImage,
                    handleFileUpload, handleDragStart, handleDragEnd, handleDragOver,
                    handleDragLeave, handleDrop, handleTouchStart, handleTouchMove,
                    handleTouchEnd, handleExport, confirmClear
                };
            }
        }).mount('#app');
    </script>
</body>
</html>
