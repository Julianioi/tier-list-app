<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>专属排行榜生成器</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 React 和 ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- 引入 Babel 使得浏览器能解析 JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- 引入 html2canvas 用于导出图片 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        /* 隐藏滚动条但保留滚动功能，让界面更清爽 */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent; 
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1; 
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8; 
        }
        /* 防止移动端长按弹出菜单和选择文字 */
        .no-select {
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            -khtml-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
            touch-action: none; /* 阻止默认触摸事件，如滚动 */
        }
        /* 自定义拖拽占位符的样式 */
        .touch-ghost {
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            opacity: 0.95;
            transform: scale(1.05) rotate(-3deg);
            box-shadow: 0 15px 30px rgba(0,0,0,0.3);
            border-radius: 8px;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-gray-50 to-gray-200 text-gray-800 font-sans selection:bg-blue-200">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const initialTiers = [
          { id: 't1', label: '夯', bgColor: '#ef4444', items: [] },
          { id: 't2', label: '顶级', bgColor: '#facc15', items: [] },
          { id: 't3', label: '人上人', bgColor: '#fef08a', items: [] },
          { id: 't4', label: 'NPC', bgColor: '#fef3c7', items: [] },
          { id: 't5', label: '拉完了', bgColor: '#ffffff', items: [] },
        ];

        function App() {
          const [tiers, setTiers] = useState(initialTiers);
          const [pool, setPool] = useState([]);
          const [dragged, setDragged] = useState(null);
          const [dragOverId, setDragOverId] = useState(null);
          const [showClearModal, setShowClearModal] = useState(false);
          const fileInputRef = useRef(null);
          
          // 触摸拖拽相关的 state 和 ref
          const [touchGhost, setTouchGhost] = useState(null);
          const scrollTimeout = useRef(null);
          const dropZonesRef = useRef({}); // 存储所有可放置区域的位置信息

          // 收集放置区域信息
          const registerDropZone = (id, element) => {
              if (element) {
                  dropZonesRef.current[id] = element;
              }
          };

          const handleFileUpload = (e) => {
            const files = Array.from(e.target.files);
            if (files.length === 0) return;

            const newItems = files.map((file) => ({
              id: Math.random().toString(36).substring(2, 10),
              url: URL.createObjectURL(file),
              name: file.name
            }));

            setPool((prev) => [...prev, ...newItems]);
            e.target.value = null; 
          };

          // --- 桌面端 Drag & Drop (原生) ---
          const handleDragStart = (e, item, sourceId) => {
            setDragged({ item, sourceId });
            e.dataTransfer.effectAllowed = 'move';
          };

          const handleDragEnd = () => {
            setDragged(null);
            setDragOverId(null);
          };

          const handleDragOver = (e, targetId) => {
            e.preventDefault();
            e.dataTransfer.dropEffect = 'move';
            if (dragOverId !== targetId) {
              setDragOverId(targetId);
            }
          };

          const handleDragLeave = (e) => {
            e.preventDefault();
            setDragOverId(null);
          };

          const handleDrop = (e, targetId) => {
            e.preventDefault();
            setDragOverId(null);
            if (!dragged) return;
            moveItem(dragged.item, dragged.sourceId, targetId);
            // 关键修复：强制清除拖拽状态，防止图片落下后卡在半透明状态
            setDragged(null); 
          };

          // --- 移动端 Touch Events ---
          const handleTouchStart = (e, item, sourceId) => {
              // 延迟一小段时间以区分点击和长按拖拽 (可选，目前直接开始)
              const touch = e.touches[0];
              const target = e.target;
              const rect = target.getBoundingClientRect();
              
              setDragged({ item, sourceId });
              
              // 创建幽灵元素
              setTouchGhost({
                  src: item.url,
                  x: touch.clientX,
                  y: touch.clientY,
                  offsetX: touch.clientX - rect.left,
                  offsetY: touch.clientY - rect.top,
                  width: rect.width,
                  height: rect.height
              });
              
              // 振动反馈 (部分设备支持)
              if (navigator.vibrate) {
                  navigator.vibrate(50);
              }
          };

          const handleTouchMove = (e) => {
              if (!touchGhost || !dragged) return;
              e.preventDefault(); // 阻止页面滚动

              const touch = e.touches[0];
              const clientX = touch.clientX;
              const clientY = touch.clientY;

              // 更新幽灵元素位置
              setTouchGhost(prev => ({
                  ...prev,
                  x: clientX,
                  y: clientY
              }));

              // 自动滚动 (当靠近边缘时)
              handleEdgeScrolling(clientY);

              // 判断当前悬浮在哪个区域之上
              let currentOverId = null;
              for (const [id, element] of Object.entries(dropZonesRef.current)) {
                  if (!element) continue;
                  const rect = element.getBoundingClientRect();
                  if (
                      clientX >= rect.left &&
                      clientX <= rect.right &&
                      clientY >= rect.top &&
                      clientY <= rect.bottom
                  ) {
                      currentOverId = id;
                      break;
                  }
              }

              if (dragOverId !== currentOverId) {
                  setDragOverId(currentOverId);
              }
          };

          const handleTouchEnd = (e) => {
              if (!dragged) return;
              
              clearTimeout(scrollTimeout.current);

              if (dragOverId && dragOverId !== dragged.sourceId) {
                  moveItem(dragged.item, dragged.sourceId, dragOverId);
              }

              setDragged(null);
              setDragOverId(null);
              setTouchGhost(null);
          };

          // 边缘自动滚动逻辑
          const handleEdgeScrolling = (clientY) => {
              const edgeSize = 60;
              const maxScrollSpeed = 15;
              const scrollY = window.scrollY;
              const windowHeight = window.innerHeight;

              clearTimeout(scrollTimeout.current);

              if (clientY < edgeSize) {
                  // 向上滚动
                  const speed = maxScrollSpeed * (1 - clientY / edgeSize);
                  if (scrollY > 0) {
                      window.scrollBy(0, -speed);
                      scrollTimeout.current = setTimeout(() => handleEdgeScrolling(clientY), 16);
                  }
              } else if (clientY > windowHeight - edgeSize) {
                  // 向下滚动
                  const speed = maxScrollSpeed * (1 - (windowHeight - clientY) / edgeSize);
                  const maxScroll = document.documentElement.scrollHeight - windowHeight;
                  if (scrollY < maxScroll) {
                      window.scrollBy(0, speed);
                      scrollTimeout.current = setTimeout(() => handleEdgeScrolling(clientY), 16);
                  }
              }
          };

          // --- 核心移动逻辑 ---
          const moveItem = (item, sourceId, targetId) => {
            if (sourceId === targetId) return;

            if (sourceId === 'pool') {
              setPool((prev) => prev.filter((i) => i.id !== item.id));
            } else {
              setTiers((prev) =>
                prev.map((tier) =>
                  tier.id === sourceId
                    ? { ...tier, items: tier.items.filter((i) => i.id !== item.id) }
                    : tier
                )
              );
            }

            if (targetId === 'pool') {
              setPool((prev) => [...prev, item]);
            } else {
              setTiers((prev) =>
                prev.map((tier) =>
                  tier.id === targetId ? { ...tier, items: [...tier.items, item] } : tier
                )
              );
            }
          };

          const handleExport = async () => {
            if (window.html2canvas) {
              const element = document.getElementById('tier-list-container');
              try {
                const canvas = await window.html2canvas(element, { 
                  useCORS: true,
                  backgroundColor: '#ffffff',
                  scale: 2 
                });
                const dataUrl = canvas.toDataURL('image/png');
                const link = document.createElement('a');
                link.download = 'tier-list-export.png';
                link.href = dataUrl;
                link.click();
              } catch (err) {
                console.error("导出图片失败", err);
                alert("导出失败，请检查浏览器权限。");
              }
            } else {
                alert("图片生成组件还在加载中，请稍后再试！");
            }
          };

          const confirmClear = () => {
            setTiers(initialTiers);
            setPool([]);
            setShowClearModal(false);
          };

          return (
            <div className="min-h-screen p-3 sm:p-6 md:p-10">
              <div className="max-w-6xl mx-auto space-y-6 md:space-y-8">
                
                {/* 顶部控制栏 */}
                <header className="flex flex-col lg:flex-row justify-between items-center pb-4 sm:pb-6 gap-4 sm:gap-6 bg-white/60 p-4 sm:p-6 rounded-2xl shadow-[0_4px_20px_rgb(0,0,0,0.03)] backdrop-blur-xl border border-white/50">
                  <div className="text-center lg:text-left">
                    <h1 className="text-2xl sm:text-3xl md:text-4xl font-black tracking-tight text-gray-900 mb-2 drop-shadow-sm">
                      ✨ 专属排行榜生成器
                    </h1>
                    <p className="text-gray-500 font-medium text-xs sm:text-sm">
                      上传图片 <span className="mx-1 sm:mx-2 text-gray-300">|</span> 自由拖拽 <span className="mx-1 sm:mx-2 text-gray-300">|</span> 一键导出长图
                    </p>
                  </div>
                  
                  <div className="flex flex-wrap justify-center gap-2 sm:gap-3 w-full lg:w-auto">
                    <input 
                      type="file" multiple accept="image/*" className="hidden" 
                      ref={fileInputRef} onChange={handleFileUpload} 
                    />
                    <button 
                      onClick={() => fileInputRef.current.click()}
                      className="flex-1 lg:flex-none justify-center bg-white hover:bg-blue-50 text-blue-600 border border-blue-200 px-4 sm:px-6 py-2.5 rounded-xl font-bold transition-all shadow-sm hover:shadow active:scale-95 flex items-center text-sm sm:text-base cursor-pointer"
                    >
                      <svg className="w-5 h-5 mr-1.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2.5} d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" /></svg>
                      上传图片
                    </button>
                    <button 
                      onClick={handleExport}
                      className="flex-1 lg:flex-none justify-center bg-blue-600 hover:bg-blue-700 text-white px-4 sm:px-6 py-2.5 rounded-xl font-bold transition-all shadow-md hover:shadow-lg hover:-translate-y-0.5 active:scale-95 flex items-center text-sm sm:text-base cursor-pointer"
                    >
                      <svg className="w-5 h-5 mr-1.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2.5} d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" /></svg>
                      导出图片
                    </button>
                    <button 
                      onClick={() => setShowClearModal(true)}
                      className="w-full sm:w-auto justify-center bg-red-50 hover:bg-red-100 text-red-600 px-4 sm:px-6 py-2.5 rounded-xl font-bold transition-all border border-red-200 shadow-sm active:scale-95 flex items-center text-sm sm:text-base cursor-pointer"
                    >
                      <svg className="w-5 h-5 mr-1.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                      清空
                    </button>
                  </div>
                </header>

                {/* 排行榜主区域 */}
                <div className="relative pt-2">
                  <div 
                    id="tier-list-container" 
                    className="bg-white p-2 sm:p-4 md:p-6 rounded-2xl shadow-[0_8px_30px_rgb(0,0,0,0.06)] ring-1 ring-gray-900/5 overflow-x-auto"
                  >
                    <div className="min-w-[400px] border-[3px] sm:border-[4px] border-gray-900 bg-gray-900 flex flex-col rounded-lg overflow-hidden gap-[2px] sm:gap-[3px]">
                      {tiers.map((tier) => (
                        <div 
                          key={tier.id} 
                          className="flex w-full min-h-[80px] sm:min-h-[100px] md:min-h-[120px] bg-gray-100"
                        >
                          <div 
                            className="w-16 sm:w-24 md:w-36 flex-shrink-0 flex items-center justify-center text-gray-900 font-black text-lg sm:text-xl md:text-3xl p-1 sm:p-2 text-center break-words select-none"
                            style={{ backgroundColor: tier.bgColor }}
                          >
                            <span className="drop-shadow-[0_1px_1px_rgba(255,255,255,0.4)]">{tier.label}</span>
                          </div>
                          
                          <div 
                            ref={(el) => registerDropZone(tier.id, el)}
                            className={`flex-1 p-2 sm:p-3 md:p-4 flex flex-wrap gap-2 sm:gap-3 items-start content-start transition-colors duration-200 ${
                              dragOverId === tier.id ? 'bg-blue-100/60 shadow-inner' : 'bg-gray-50'
                            }`}
                            onDragOver={(e) => handleDragOver(e, tier.id)}
                            onDragLeave={handleDragLeave}
                            onDrop={(e) => handleDrop(e, tier.id)}
                          >
                            {tier.items.map((item) => (
                              <div
                                key={item.id}
                                draggable
                                onDragStart={(e) => handleDragStart(e, item, tier.id)}
                                onDragEnd={handleDragEnd}
                                onTouchStart={(e) => handleTouchStart(e, item, tier.id)}
                                onTouchMove={handleTouchMove}
                                onTouchEnd={handleTouchEnd}
                                onTouchCancel={handleTouchEnd}
                                className={`relative group cursor-grab active:cursor-grabbing hover:z-10 transition-transform duration-100 no-select ${dragged && dragged.item.id === item.id ? 'opacity-50 scale-95 shadow-md' : 'opacity-100'}`}
                              >
                                <img
                                  src={item.url}
                                  alt={item.name}
                                  className="w-12 h-12 sm:w-16 sm:h-16 md:w-24 md:h-24 object-cover border-2 sm:border-[3px] border-white rounded-md sm:rounded-lg shadow-sm group-hover:shadow-xl group-hover:scale-110 group-hover:border-blue-400 transition-all duration-200 pointer-events-none"
                                />
                              </div>
                            ))}
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                </div>

                {/* 底部待选图片池 */}
                <div className="pt-2 sm:pt-4">
                  <h2 className="text-lg sm:text-xl font-bold mb-3 sm:mb-4 flex items-center text-gray-800 px-2 select-none">
                    <span className="bg-blue-100 text-blue-600 p-1.5 rounded-lg mr-2 shadow-sm">
                      <svg className="w-5 h-5 sm:w-6 sm:h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2.5} d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" /></svg>
                    </span>
                    待分类图片库
                    <span className="ml-3 bg-white shadow-sm border border-gray-200 text-gray-600 py-0.5 px-3 rounded-full text-sm font-bold">
                      {pool.length}
                    </span>
                  </h2>
                  <div 
                    ref={(el) => registerDropZone('pool', el)}
                    className={`border-2 border-dashed rounded-2xl p-4 sm:p-6 min-h-[160px] sm:min-h-[220px] flex flex-wrap gap-2 sm:gap-4 items-start content-start transition-all duration-300 ${
                      dragOverId === 'pool' ? 'border-blue-500 bg-blue-50/80 shadow-inner' : 'border-gray-300 bg-white/60 hover:bg-white/80'
                    }`}
                    onDragOver={(e) => handleDragOver(e, 'pool')}
                    onDragLeave={handleDragLeave}
                    onDrop={(e) => handleDrop(e, 'pool')}
                  >
                    {pool.length === 0 ? (
                      <div className="w-full h-full flex flex-col items-center justify-center text-gray-400 mt-6 sm:mt-10 pointer-events-none select-none">
                        <div className="bg-gray-100 p-4 rounded-full mb-3 shadow-inner">
                          <svg className="w-8 h-8 sm:w-12 sm:h-12 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.5} d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>
                        </div>
                        <p className="text-sm sm:text-base text-center px-4">
                          点击上方 <span className="font-bold text-gray-500">上传图片</span> 将图片添加至此<br className="hidden sm:block"/>然后拖拽到上方排行榜中
                        </p>
                      </div>
                    ) : (
                      pool.map((item) => (
                        <div
                          key={item.id}
                          draggable
                          onDragStart={(e) => handleDragStart(e, item, 'pool')}
                          onDragEnd={handleDragEnd}
                          onTouchStart={(e) => handleTouchStart(e, item, 'pool')}
                          onTouchMove={handleTouchMove}
                          onTouchEnd={handleTouchEnd}
                          onTouchCancel={handleTouchEnd}
                          className={`relative group cursor-grab active:cursor-grabbing hover:z-10 transition-transform duration-100 no-select ${dragged && dragged.item.id === item.id ? 'opacity-50 scale-95 shadow-md' : 'opacity-100'}`}
                        >
                          <img
                            src={item.url}
                            alt={item.name}
                            className="w-12 h-12 sm:w-16 sm:h-16 md:w-24 md:h-24 object-cover border-2 sm:border-[3px] border-white rounded-md sm:rounded-lg shadow-sm group-hover:shadow-xl group-hover:scale-110 group-hover:border-blue-400 transition-all duration-200 pointer-events-none"
                          />
                        </div>
                      ))
                    )}
                  </div>
                </div>

                {/* 清空弹窗 */}
                {showClearModal && (
                  <div className="fixed inset-0 bg-gray-900/30 backdrop-blur-sm flex items-center justify-center z-50 p-4">
                    <div className="bg-white rounded-2xl shadow-2xl p-6 sm:p-8 max-w-sm w-full animate-in fade-in zoom-in duration-200">
                      <div className="w-12 h-12 rounded-full bg-red-100 flex items-center justify-center mb-4">
                        <svg className="w-6 h-6 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" /></svg>
                      </div>
                      <h3 className="text-xl font-black text-gray-900 mb-2">确认清空？</h3>
                      <p className="text-gray-500 text-sm sm:text-base mb-8 leading-relaxed">这将会移除所有已上传的图片并重置所有分类，该操作不可恢复。</p>
                      <div className="flex justify-end gap-3">
                        <button 
                          onClick={() => setShowClearModal(false)}
                          className="px-5 py-2.5 rounded-xl font-bold text-gray-600 bg-gray-100 hover:bg-gray-200 transition-colors cursor-pointer"
                        >
                          取消
                        </button>
                        <button 
                          onClick={confirmClear}
                          className="px-5 py-2.5 rounded-xl font-bold bg-red-600 text-white hover:bg-red-700 transition-colors shadow-sm shadow-red-200 cursor-pointer"
                        >
                          确认清空
                        </button>
                      </div>
                    </div>
                  </div>
                )}

              </div>
              
              {/* 移动端拖拽幽灵元素 */}
              {touchGhost && (
                  <img
                      src={touchGhost.src}
                      className="touch-ghost"
                      style={{
                          left: `${touchGhost.x - touchGhost.offsetX}px`,
                          top: `${touchGhost.y - touchGhost.offsetY}px`,
                          width: `${touchGhost.width}px`,
                          height: `${touchGhost.height}px`,
                      }}
                      alt="dragging"
                  />
              )}
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
