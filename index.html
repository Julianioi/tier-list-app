<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>专属排行榜生成器</title>
    <!-- 引入 Tailwind CSS (使用官方节点，该节点已在国内有较好加速) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 React 和 ReactDOM (已替换为国内极速 Staticfile CDN) -->
    <script crossorigin src="https://cdn.staticfile.net/react/18.2.0/umd/react.production.min.js"></script>
    <script crossorigin src="https://cdn.staticfile.net/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <!-- 引入 Babel 使得浏览器能解析 JSX (已替换为国内极速 Staticfile CDN，解决加载慢的核心) -->
    <script src="https://cdn.staticfile.net/babel-standalone/7.23.10/babel.min.js"></script>
    <!-- 引入 html2canvas 用于导出图片 (已替换为国内极速 Staticfile CDN) -->
    <script src="https://cdn.staticfile.net/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        /* 隐藏滚动条但保留滚动功能，让界面更清爽 */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent; 
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1; 
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8; 
        }
        /* 左侧深色侧边栏的滚动条定制 */
        .dark-scrollbar::-webkit-scrollbar-thumb {
            background: #4b5563; 
        }
        .dark-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #6b7280; 
        }
        
        /* 防止移动端长按弹出菜单和选择文字 */
        .no-select {
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            -khtml-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
            touch-action: none; 
        }
        /* 自定义拖拽占位符的样式 */
        .touch-ghost {
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            opacity: 0.95;
            transform: scale(1.05) rotate(-3deg);
            box-shadow: 0 15px 30px rgba(0,0,0,0.3);
            border-radius: 8px;
        }
        
        /* 手机竖屏提示层样式 */
        .landscape-prompt { display: none; }
        @media screen and (orientation: portrait) {
            .landscape-prompt.active { display: flex; }
        }
    </style>
</head>
<body class="bg-gradient-to-br from-gray-50 to-gray-200 text-gray-800 font-sans selection:bg-blue-200 overflow-x-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const initialTiers = [
          { id: 't1', label: '夯', bgColor: '#ef4444', items: [] },
          { id: 't2', label: '顶级', bgColor: '#facc15', items: [] },
          { id: 't3', label: '人上人', bgColor: '#fef08a', items: [] },
          { id: 't4', label: 'NPC', bgColor: '#fef3c7', items: [] },
          { id: 't5', label: '拉完了', bgColor: '#ffffff', items: [] },
        ];

        function App() {
          const [tiers, setTiers] = useState(initialTiers);
          const [pool, setPool] = useState([]);
          const [dragged, setDragged] = useState(null);
          const [dragOverId, setDragOverId] = useState(null);
          const [showClearModal, setShowClearModal] = useState(false);
          
          // 全屏状态控制
          const [isFullscreen, setIsFullscreen] = useState(false);
          
          const fileInputRef = useRef(null);
          
          // 触摸拖拽相关的 state 和 ref
          const [touchGhost, setTouchGhost] = useState(null);
          const scrollTimeout = useRef(null);
          const dropZonesRef = useRef({});

          const registerDropZone = (id, element) => {
              if (element) {
                  dropZonesRef.current[id] = element;
              }
          };

          const handleFileUpload = (e) => {
            const files = Array.from(e.target.files);
            if (files.length === 0) return;

            const newItems = files.map((file) => ({
              id: Math.random().toString(36).substring(2, 10),
              url: URL.createObjectURL(file),
              name: file.name
            }));

            setPool((prev) => [...prev, ...newItems]);
            e.target.value = null; 
          };

          const handleDragStart = (e, item, sourceId) => {
            setDragged({ item, sourceId });
            e.dataTransfer.effectAllowed = 'move';
          };

          const handleDragEnd = () => {
            setDragged(null);
            setDragOverId(null);
          };

          const handleDragOver = (e, targetId) => {
            e.preventDefault();
            e.dataTransfer.dropEffect = 'move';
            if (dragOverId !== targetId) {
              setDragOverId(targetId);
            }
          };

          const handleDragLeave = (e) => {
            e.preventDefault();
            setDragOverId(null);
          };

          const handleDrop = (e, targetId) => {
            e.preventDefault();
            setDragOverId(null);
            if (!dragged) return;
            moveItem(dragged.item, dragged.sourceId, targetId);
            setDragged(null); 
          };

          const handleTouchStart = (e, item, sourceId) => {
              const touch = e.touches[0];
              const target = e.target;
              const rect = target.getBoundingClientRect();
              
              setDragged({ item, sourceId });
              
              setTouchGhost({
                  src: item.url,
                  x: touch.clientX,
                  y: touch.clientY,
                  offsetX: touch.clientX - rect.left,
                  offsetY: touch.clientY - rect.top,
                  width: rect.width,
                  height: rect.height
              });
              
              if (navigator.vibrate) {
                  navigator.vibrate(50);
              }
          };

          const handleTouchMove = (e) => {
              if (!touchGhost || !dragged) return;
              e.preventDefault();

              const touch = e.touches[0];
              const clientX = touch.clientX;
              const clientY = touch.clientY;

              setTouchGhost(prev => ({
                  ...prev,
                  x: clientX,
                  y: clientY
              }));

              handleEdgeScrolling(clientY);

              let currentOverId = null;
              for (const [id, element] of Object.entries(dropZonesRef.current)) {
                  if (!element) continue;
                  const rect = element.getBoundingClientRect();
                  if (
                      clientX >= rect.left &&
                      clientX <= rect.right &&
                      clientY >= rect.top &&
                      clientY <= rect.bottom
                  ) {
                      currentOverId = id;
                      break;
                  }
              }

              if (dragOverId !== currentOverId) {
                  setDragOverId(currentOverId);
              }
          };

          const handleTouchEnd = (e) => {
              if (!dragged) return;
              
              clearTimeout(scrollTimeout.current);

              if (dragOverId && dragOverId !== dragged.sourceId) {
                  moveItem(dragged.item, dragged.sourceId, dragOverId);
              }

              setDragged(null);
              setDragOverId(null);
              setTouchGhost(null);
          };

          const handleEdgeScrolling = (clientY) => {
              const edgeSize = 60;
              const maxScrollSpeed = 15;
              const scrollY = window.scrollY;
              const windowHeight = window.innerHeight;

              clearTimeout(scrollTimeout.current);

              if (clientY < edgeSize) {
                  const speed = maxScrollSpeed * (1 - clientY / edgeSize);
                  if (scrollY > 0) {
                      window.scrollBy(0, -speed);
                      scrollTimeout.current = setTimeout(() => handleEdgeScrolling(clientY), 16);
                  }
              } else if (clientY > windowHeight - edgeSize) {
                  const speed = maxScrollSpeed * (1 - (windowHeight - clientY) / edgeSize);
                  const maxScroll = document.documentElement.scrollHeight - windowHeight;
                  if (scrollY < maxScroll) {
                      window.scrollBy(0, speed);
                      scrollTimeout.current = setTimeout(() => handleEdgeScrolling(clientY), 16);
                  }
              }
          };

          const moveItem = (item, sourceId, targetId) => {
            if (sourceId === targetId) return;

            if (sourceId === 'pool') {
              setPool((prev) => prev.filter((i) => i.id !== item.id));
            } else {
              setTiers((prev) =>
                prev.map((tier) =>
                  tier.id === sourceId
                    ? { ...tier, items: tier.items.filter((i) => i.id !== item.id) }
                    : tier
                )
              );
            }

            if (targetId === 'pool') {
              setPool((prev) => [...prev, item]);
            } else {
              setTiers((prev) =>
                prev.map((tier) =>
                  tier.id === targetId ? { ...tier, items: [...tier.items, item] } : tier
                )
              );
            }
          };

          const handleExport = async () => {
            if (window.html2canvas) {
              const element = document.getElementById('tier-list-core');
              
              try {
                const canvas = await window.html2canvas(element, { 
                  useCORS: true,
                  backgroundColor: '#111827', 
                  scale: 2,
                  onclone: (clonedDoc) => {
                      const clonedElement = clonedDoc.getElementById('tier-list-core');
                      clonedElement.style.width = '800px'; 
                      clonedElement.style.minWidth = '800px';
                      clonedElement.style.maxWidth = 'none';
                  }
                });
                const dataUrl = canvas.toDataURL('image/png');
                const link = document.createElement('a');
                link.download = 'tier-list-export.png';
                link.href = dataUrl;
                link.click();
              } catch (err) {
                console.error("导出图片失败", err);
                alert("导出失败，请检查浏览器权限。");
              }
            } else {
                alert("图片生成组件还在加载中，请稍后再试！");
            }
          };

          const confirmClear = () => {
            setTiers(initialTiers);
            setPool([]);
            setShowClearModal(false);
          };
          
          // 渲染待分类图片库中的单个图片组件（复用逻辑）
          const renderPoolItem = (item, inSidebar = false) => (
            <div
              key={item.id}
              draggable
              onDragStart={(e) => handleDragStart(e, item, 'pool')}
              onDragEnd={handleDragEnd}
              onTouchStart={(e) => handleTouchStart(e, item, 'pool')}
              onTouchMove={handleTouchMove}
              onTouchEnd={handleTouchEnd}
              onTouchCancel={handleTouchEnd}
              className={`relative group cursor-grab active:cursor-grabbing hover:z-10 transition-transform duration-100 no-select ${dragged && dragged.item.id === item.id ? 'opacity-50 scale-95 shadow-md' : 'opacity-100'} ${inSidebar ? 'w-full' : ''}`}
            >
              <img
                src={item.url}
                alt={item.name}
                className={`${inSidebar ? 'w-full h-auto aspect-square border-2 border-gray-600 rounded-lg' : 'w-16 h-16 sm:w-20 sm:h-20 md:w-24 md:h-24 border-[3px] border-white rounded-lg'} object-cover shadow-sm group-hover:shadow-xl group-hover:scale-110 group-hover:border-blue-400 transition-all duration-200 pointer-events-none`}
              />
            </div>
          );

          return (
            <div className={isFullscreen ? "fixed inset-0 z-50 bg-gray-100 flex flex-row overflow-hidden" : "min-h-screen p-3 sm:p-6 md:p-10"}>
              
              {/* --- 手机全屏竖屏提示层 --- */}
              <div className={`landscape-prompt ${isFullscreen ? 'active' : ''} fixed inset-0 z-[200] bg-gray-900 text-white flex-col items-center justify-center p-6 text-center`}>
                  <div className="mb-8 relative">
                      <svg className="w-20 h-20 text-blue-500 animate-[spin_2s_ease-in-out_infinite]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.5} d="M12 18h.01M8 21h8a2 2 0 002-2V5a2 2 0 00-2-2H8a2 2 0 00-2 2v14a2 2 0 002 2z" /></svg>
                  </div>
                  <h2 className="text-2xl font-black mb-3 tracking-wider">请旋转手机至横屏</h2>
                  <p className="text-gray-400 mb-8 text-sm">全屏排版模式在横屏下体验极佳<br/>（请确保已关闭系统“方向锁定”）</p>
                  <button onClick={() => setIsFullscreen(false)} className="px-8 py-3 bg-gray-800 hover:bg-gray-700 rounded-xl font-bold transition-colors shadow-lg border border-gray-700 cursor-pointer text-gray-300">
                      暂不全屏
                  </button>
              </div>

              {/* --- 左侧图库侧边栏 (仅全屏模式下显示) --- */}
              {isFullscreen && (
                  <div 
                      ref={(el) => registerDropZone('pool', el)}
                      className="w-20 sm:w-28 md:w-36 bg-gray-800 border-r border-gray-900 flex flex-col gap-2 p-2 sm:p-3 overflow-y-auto dark-scrollbar"
                      onDragOver={(e) => handleDragOver(e, 'pool')}
                      onDragLeave={handleDragLeave}
                      onDrop={(e) => handleDrop(e, 'pool')}
                  >
                      <div className="text-center text-gray-400 text-xs font-bold py-1 border-b border-gray-700 mb-1 select-none">待排图库 ({pool.length})</div>
                      {pool.length === 0 && (
                          <div className="text-gray-500 text-xs text-center mt-6 select-none opacity-50">
                              <svg className="w-6 h-6 mx-auto mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>
                              空
                          </div>
                      )}
                      {pool.map((item) => renderPoolItem(item, true))}
                  </div>
              )}

              {/* --- 主内容区域 (核心表格与顶部栏) --- */}
              <div className={isFullscreen ? "flex-1 overflow-y-auto p-2 sm:p-4 md:p-6 relative" : "max-w-6xl mx-auto space-y-6 md:space-y-8"}>
                
                {/* 顶部控制栏 (普通模式下显示) */}
                {!isFullscreen && (
                  <header className="flex flex-col lg:flex-row justify-between items-center pb-4 sm:pb-6 gap-4 sm:gap-6 bg-white/60 p-4 sm:p-6 rounded-2xl shadow-[0_4px_20px_rgb(0,0,0,0.03)] backdrop-blur-xl border border-white/50">
                    <div className="text-center lg:text-left">
                      <h1 className="text-2xl sm:text-3xl md:text-4xl font-black tracking-tight text-gray-900 mb-2 drop-shadow-sm">
                        ✨ 专属排行榜生成器
                      </h1>
                      <p className="text-gray-500 font-medium text-xs sm:text-sm">
                        上传图片 <span className="mx-1 sm:mx-2 text-gray-300">|</span> 自由拖拽 <span className="mx-1 sm:mx-2 text-gray-300">|</span> 一键导出长图
                      </p>
                    </div>
                    
                    <div className="flex flex-wrap justify-center gap-2 sm:gap-3 w-full lg:w-auto">
                      <input 
                        type="file" multiple accept="image/*" className="hidden" 
                        ref={fileInputRef} onChange={handleFileUpload} 
                      />
                      <button 
                        onClick={() => fileInputRef.current.click()}
                        className="flex-1 lg:flex-none justify-center bg-white hover:bg-blue-50 text-blue-600 border border-blue-200 px-3 sm:px-5 py-2.5 rounded-xl font-bold transition-all shadow-sm hover:shadow active:scale-95 flex items-center text-sm sm:text-base cursor-pointer"
                      >
                        <svg className="w-5 h-5 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2.5} d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" /></svg>
                        上传
                      </button>
                      
                      {/* 全屏排版按钮 */}
                      <button 
                        onClick={() => setIsFullscreen(true)}
                        className="flex-1 lg:flex-none justify-center bg-purple-50 hover:bg-purple-100 text-purple-600 border border-purple-200 px-3 sm:px-5 py-2.5 rounded-xl font-bold transition-all shadow-sm hover:shadow active:scale-95 flex items-center text-sm sm:text-base cursor-pointer"
                      >
                        <svg className="w-5 h-5 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4" /></svg>
                        全屏排版
                      </button>

                      <button 
                        onClick={handleExport}
                        className="flex-1 lg:flex-none justify-center bg-blue-600 hover:bg-blue-700 text-white px-3 sm:px-5 py-2.5 rounded-xl font-bold transition-all shadow-md hover:shadow-lg hover:-translate-y-0.5 active:scale-95 flex items-center text-sm sm:text-base cursor-pointer"
                      >
                        <svg className="w-5 h-5 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2.5} d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" /></svg>
                        导出
                      </button>
                      <button 
                        onClick={() => setShowClearModal(true)}
                        className="w-full sm:w-auto justify-center bg-red-50 hover:bg-red-100 text-red-600 px-3 sm:px-5 py-2.5 rounded-xl font-bold transition-all border border-red-200 shadow-sm active:scale-95 flex items-center text-sm sm:text-base cursor-pointer"
                      >
                        清空
                      </button>
                    </div>
                  </header>
                )}

                {/* 悬浮操作栏 (仅全屏模式下显示) */}
                {isFullscreen && (
                    <div className="absolute top-2 right-2 sm:top-4 sm:right-6 z-10 flex gap-2 sm:gap-3 opacity-90 hover:opacity-100 transition-opacity">
                        <button 
                            onClick={handleExport}
                            className="bg-blue-600 shadow-lg border border-blue-700 px-3 sm:px-4 py-2 rounded-lg text-xs sm:text-sm font-bold text-white hover:bg-blue-700 flex items-center cursor-pointer transition-transform active:scale-95"
                        >
                            <svg className="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2.5} d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" /></svg>
                            导出长图
                        </button>
                        <button 
                            onClick={() => setIsFullscreen(false)} 
                            className="bg-white/90 backdrop-blur shadow-lg border border-gray-300 px-3 sm:px-4 py-2 rounded-lg text-xs sm:text-sm font-bold text-gray-700 hover:bg-white flex items-center cursor-pointer transition-transform active:scale-95"
                        >
                            退出全屏
                        </button>
                    </div>
                )}

                {/* 排行榜核心渲染区域 */}
                <div className={isFullscreen ? "max-w-6xl mx-auto mt-14 sm:mt-0 pb-10" : "relative pt-2"}>
                  <div className={isFullscreen ? "" : "bg-white p-2 sm:p-4 md:p-6 rounded-2xl shadow-[0_8px_30px_rgb(0,0,0,0.06)] ring-1 ring-gray-900/5 overflow-x-auto"}>
                    <div id="tier-list-core" className="min-w-[450px] border-[3px] sm:border-[4px] border-gray-900 bg-gray-900 flex flex-col rounded-lg overflow-hidden">
                      {tiers.map((tier, index) => (
                        <div 
                          key={tier.id} 
                          className={`flex w-full min-h-[90px] sm:min-h-[110px] md:min-h-[130px] bg-gray-100 ${index !== tiers.length - 1 ? 'border-b-[3px] sm:border-b-[4px] border-gray-900' : ''}`}
                        >
                          <div 
                            className="w-20 sm:w-28 md:w-36 flex-shrink-0 flex items-center justify-center border-r-[3px] sm:border-r-[4px] border-gray-900 text-gray-900 font-black text-lg sm:text-xl md:text-3xl p-1 sm:p-2 text-center break-words select-none"
                            style={{ backgroundColor: tier.bgColor }}
                          >
                            <span className="drop-shadow-[0_1px_1px_rgba(255,255,255,0.4)]">{tier.label}</span>
                          </div>
                          
                          <div 
                            ref={(el) => registerDropZone(tier.id, el)}
                            className={`flex-1 p-3 sm:p-4 md:p-5 flex flex-wrap gap-2 sm:gap-3 items-start content-start transition-colors duration-200 ${
                              dragOverId === tier.id ? 'bg-blue-100/60 shadow-inner' : 'bg-gray-50'
                            }`}
                            onDragOver={(e) => handleDragOver(e, tier.id)}
                            onDragLeave={handleDragLeave}
                            onDrop={(e) => handleDrop(e, tier.id)}
                          >
                            {tier.items.map((item) => (
                              <div
                                key={item.id}
                                draggable
                                onDragStart={(e) => handleDragStart(e, item, tier.id)}
                                onDragEnd={handleDragEnd}
                                onTouchStart={(e) => handleTouchStart(e, item, tier.id)}
                                onTouchMove={handleTouchMove}
                                onTouchEnd={handleTouchEnd}
                                onTouchCancel={handleTouchEnd}
                                className={`relative group cursor-grab active:cursor-grabbing hover:z-10 transition-transform duration-100 no-select ${dragged && dragged.item.id === item.id ? 'opacity-50 scale-95 shadow-md' : 'opacity-100'}`}
                              >
                                <img
                                  src={item.url}
                                  alt={item.name}
                                  className="w-16 h-16 sm:w-20 sm:h-20 md:w-24 md:h-24 object-cover border-[3px] border-white rounded-lg shadow-sm group-hover:shadow-xl group-hover:scale-110 group-hover:border-blue-400 transition-all duration-200 pointer-events-none"
                                />
                              </div>
                            ))}
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                </div>

                {/* 底部待选图片池 (仅普通模式下显示) */}
                {!isFullscreen && (
                  <div className="pt-2 sm:pt-4">
                    <h2 className="text-lg sm:text-xl font-bold mb-3 sm:mb-4 flex items-center text-gray-800 px-2 select-none">
                      <span className="bg-blue-100 text-blue-600 p-1.5 rounded-lg mr-2 shadow-sm">
                        <svg className="w-5 h-5 sm:w-6 sm:h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2.5} d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" /></svg>
                      </span>
                      待分类图片库
                      <span className="ml-3 bg-white shadow-sm border border-gray-200 text-gray-600 py-0.5 px-3 rounded-full text-sm font-bold">
                        {pool.length}
                      </span>
                    </h2>
                    <div 
                      ref={(el) => registerDropZone('pool', el)}
                      className={`border-2 border-dashed rounded-2xl p-4 sm:p-6 min-h-[160px] sm:min-h-[220px] flex flex-wrap gap-2 sm:gap-4 items-start content-start transition-all duration-300 ${
                        dragOverId === 'pool' ? 'border-blue-500 bg-blue-50/80 shadow-inner' : 'border-gray-300 bg-white/60 hover:bg-white/80'
                      }`}
                      onDragOver={(e) => handleDragOver(e, 'pool')}
                      onDragLeave={handleDragLeave}
                      onDrop={(e) => handleDrop(e, 'pool')}
                    >
                      {pool.length === 0 ? (
                        <div className="w-full h-full flex flex-col items-center justify-center text-gray-400 mt-6 sm:mt-10 pointer-events-none select-none">
                          <div className="bg-gray-100 p-4 rounded-full mb-3 shadow-inner">
                            <svg className="w-8 h-8 sm:w-12 sm:h-12 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.5} d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>
                          </div>
                          <p className="text-sm sm:text-base text-center px-4">
                            点击上方 <span className="font-bold text-gray-500">上传图片</span> 将图片添加至此<br className="hidden sm:block"/>然后拖拽到上方排行榜中
                          </p>
                        </div>
                      ) : (
                        pool.map((item) => renderPoolItem(item, false))
                      )}
                    </div>
                  </div>
                )}

                {/* 清空确认弹窗 */}
                {showClearModal && (
                  <div className="fixed inset-0 bg-gray-900/40 backdrop-blur-sm flex items-center justify-center z-[999] p-4">
                    <div className="bg-white rounded-2xl shadow-2xl p-6 sm:p-8 max-w-sm w-full animate-in fade-in zoom-in duration-200">
                      <div className="w-12 h-12 rounded-full bg-red-100 flex items-center justify-center mb-4">
                        <svg className="w-6 h-6 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" /></svg>
                      </div>
                      <h3 className="text-xl font-black text-gray-900 mb-2">确认清空？</h3>
                      <p className="text-gray-500 text-sm sm:text-base mb-8 leading-relaxed">这将会移除所有已上传的图片并重置所有分类，该操作不可恢复。</p>
                      <div className="flex justify-end gap-3">
                        <button 
                          onClick={() => setShowClearModal(false)}
                          className="px-5 py-2.5 rounded-xl font-bold text-gray-600 bg-gray-100 hover:bg-gray-200 transition-colors cursor-pointer"
                        >
                          取消
                        </button>
                        <button 
                          onClick={confirmClear}
                          className="px-5 py-2.5 rounded-xl font-bold bg-red-600 text-white hover:bg-red-700 transition-colors shadow-sm shadow-red-200 cursor-pointer"
                        >
                          确认清空
                        </button>
                      </div>
                    </div>
                  </div>
                )}

              </div>
              
              {/* 移动端拖拽幽灵元素 */}
              {touchGhost && (
                  <img
                      src={touchGhost.src}
                      className="touch-ghost"
                      style={{
                          left: `${touchGhost.x - touchGhost.offsetX}px`,
                          top: `${touchGhost.y - touchGhost.offsetY}px`,
                          width: `${touchGhost.width}px`,
                          height: `${touchGhost.height}px`,
                      }}
                      alt="dragging"
                  />
              )}
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
